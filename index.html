<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="stylesheet" href="assets/css/style.css" />

		<title>Document</title>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<img
					src="assets/img/Clube_Atlético_Mineiro.svg.png"
					alt="Logo Atletico Mineiro"
					width="40px"
				/>
				<h1>Busca de Jogadores</h1>
			</div>
			<div class="searchBox">
				<input type="text" name="names" id="names" placeholder="pesquisar..." />
				<!-- <button onclick="renderPlayers(atleticoPlayers)">Gerar Nomes</button> -->
			</div>

			<div class="filterBox">
				<label for="position">Escolha uma posição:</label>

				<select id="position">
					<option value="">Filtrar por posição</option>
					<option value="goleiro">Goleiro</option>
					<option value="zagueiro">Zagueiro</option>
					<option value="meia">Meia</option>
					<option value="atacante">Atacante</option>
				</select>
			</div>

			<h2>Jogadores</h2>
			<ul class="playersList" id="playersList">
				<!-- <li id="playerList"></li> -->
			</ul>
		</div>

		<script src="assets/js/script.js"></script>
	</body>
</html>
