<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link
			rel="icon"
			type="image/png"
			href="assets/favicon/favicon-96x96.png"
			sizes="96x96"
		/>
		<link rel="shortcut icon" href="assets/favicon/favicon.ico" />

		<link rel="stylesheet" href="assets/css/style.css" />

		<title>Atlético Mineiro</title>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<img
					src="assets/img/Clube_Atlético_Mineiro.svg.png"
					alt="Logo Atletico Mineiro"
					width="40px"
				/>
				<h1>Atlético Mineiro</h1>
			</div>
			<section class="filters">
				<h2>Busca de Jogadores</h2>
				<div class="searchBox">
					<input
						type="text"
						name="names"
						id="names"
						placeholder="pesquisar..."
					/>
				</div>

				<div class="filterBox">
					<select id="position">
						<option value="">Filtrar por posição</option>
						<option value="goleiro">Goleiro</option>
						<option value="zagueiro">Zagueiro</option>
						<option value="meia">Meia</option>
						<option value="atacante">Atacante</option>
					</select>
				</div>
			</section>

			<section class="results">
				<h2>Jogadores</h2>
				<p id="playersCounter"></p>
				<ul class="playersList" id="playersList"></ul>
			</section>
		</div>

		<script src="assets/js/main.js"></script>
	</body>
</html>
