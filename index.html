<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link
			rel="icon"
			type="image/png"
			href="assets/favicon/favicon-96x96.png"
			sizes="96x96"
		/>
		<link rel="shortcut icon" href="assets/favicon/favicon.ico" />

		<link rel="stylesheet" href="assets/css/style.css" />

		<title>Atlético Mineiro</title>
	</head>
	<body>
		<div class="container">
			<header class="header">
				<img
					src="assets/img/Clube_Atlético_Mineiro.svg.png"
					alt="Logo Atletico Mineiro"
					width="40px"
				/>
				<h1>Atlético Mineiro</h1>
			</header>
			<nav class="navigation">
				<ul>
					<li>
						<a href="index.html" class="active">Jogadores </a>
					</li>
					<li>
						<a href="stats.html">Estatisticas</a>
					</li>
				</ul>
			</nav>
			<main>
				<section class="filters">
					<h2>Busca de Jogadores</h2>
					<div class="searchBox">
						<input
							type="text"
							name="names"
							id="names"
							placeholder="pesquisar..."
						/>
					</div>

					<div class="filterBox">
						<select id="position">
							<option value="">Filtrar por posição</option>
							<option value="goleiro">Goleiro</option>
							<option value="zagueiro">Zagueiro</option>
							<option value="meia">Meia</option>
							<option value="atacante">Atacante</option>
						</select>
					</div>
				</section>

				<section class="results">
					<h2>Jogadores</h2>
					<p id="playersCounter"></p>
					<ul class="playersList" id="playersList"></ul>
				</section>
			</main>
		</div>
		<div class="modal" id="playerModal">
			<div class="modalContent">
				<button id="closeModal">✖</button>

				<div id="modalPlayerInfo"></div>
			</div>
		</div>
		<button id="backToTop" class="backToTop">
			<svg
				xmlns="http://www.w3.org/2000/svg"
				width="30"
				height="30"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
				class="lucide lucide-move-up-icon lucide-move-up"
			>
				<path d="M8 6L12 2L16 6" />
				<path d="M12 2V22" />
			</svg>
		</button>
		<script src="assets/js/playersData.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
